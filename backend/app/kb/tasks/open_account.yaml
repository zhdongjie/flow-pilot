task:
  id: open_account
  name: 开户申请流程

steps:
  - step: 1
    page: /home
    state:
      auth: unauthenticated
    action: 填写登录信息
    highlight: ui.form_login
    desc: 输入手机号与验证码
    form:
      - field: phone
        desc: 手机号
      - field: code
        desc: 验证码

  - step: 2
    page: /home
    state:
      auth: unauthenticated
    action: 点击【登录进入】
    highlight: ui.btn_login
    desc: 登录后进入客户服务中心

  - step: 3
    page: /customer
    state:
      auth: authenticated
    action: 点击【开户申请】
    highlight: ui.menu_open_account
    desc: 进入开户申请表单页面

  - step: 4
    page: /customer/create
    state:
      auth: authenticated
    action: 填写开户申请表单
    highlight: ui.form_open_account
    desc: 依次填写客户信息与风险等级
    form:
      - field: name
        desc: 客户姓名
      - field: idCard
        desc: 身份证号
      - field: phone
        desc: 联系电话
      - field: riskLevel
        desc: 风险等级
      - field: address
        desc: 开户地址
      - field: note
        desc: 备注

  - step: 5
    page: /customer/create
    state:
      auth: authenticated
    action: 点击【提交申请】
    highlight: ui.btn_submit_application
    desc: 提交后进入审核流程